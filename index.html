<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Sponut</title>
</head>

<body>
    <header class="app-header">
        <div class="logo">SPONUT</div>

        <div class="menu-wrap" id="menuWrap">
            <div class="menu-btn" id="menuBtn">...</div>
            <div class="dropdown" id="dropdown">
                <div class="dropdown-item"> Accueil</div>
                <div class="dropdown-item"> Mes Repas</div>
            </div>
        </div>
    </header>
    <main class="content">
        <div class="profil">...</div>
        <div class="nutrition">...</div>
        <div class="semaine">...</div>
    </main>

    <div class="macros">
        <div class="macro-card">
            <div class="macro-icon cal"> emoji feu</div>
            <div class="macro-body">
                <div class="macro-top">
                    <div class="macro-label">Calories</div>
                    <div class="macro-value"><span>1 840</span></div>
                </div>
                <div class="macro-bar-wrap">
                    <div class="macro-bar bar-cal"></div>
                </div>
            </div>
        </div>

        <div class="macro-card">
            <div class="macro-icon prot">emoji muscle</div>
            <div class="macro-body">
                <div class="macro-top">
                    <div class="macro-label">Protéines</div>
                    <div class="macro-value"><span>122</span>
                    </div>
                    <div class="macro-bar-wrap">
                        <div class="macro-bar bar-prot"></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="macro-card">
            <div class="macro-icon gluc">emoji blé </div>
            <div class="macro-body">
                <div class="macro-top">
                    <div class="macro-bar-wrap">
                        <div class="macro-bar bar-gluc"></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="macro-card">
            <div class="macro-icon lip">emoji avocat</div>
            <div class="macro-body">
                <div class="macro-top">
                    <div class="macro-label">Lipides</div>
                    <div class="macro-value">
                        <div class="macro-bar bar-lip"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="week-section">
            <div class="section-title">Cette semaine</div>
            <div class="week-grid">
                <div class="day-card done">
                    <div class="day-label>">Lundi</div>
                    <div class="day-dot"></div></div>
                                    <div class="day-card done">
                    <div class="day-label>">Mardi</div>
                    <div class="day-dot"></div></div>
                                    <div class="day-card done">
                    <div class="day-label>">Mercredi</div>
                    <div class="day-dot"></div></div>
                                    <div class="day-card done">
                    <div class="day-label>">Jeudi</div>
                    <div class="day-dot"></div></div>
                                    <div class="day-card done">
                    <div class="day-label>">Vendredi</div>
                    <div class="day-dot"></div></div>
                                    <div class="day-card done">
                    <div class="day-label>">Samedi</div>
                    <div class="day-dot"></div></div>
                                    <div class="day-card done">
                    <div class="day-label>">Dimanche</div>
                    <div class="day-dot"></div></div>
            </div>
    <script src="script.js"></script>
</body>

</html>
